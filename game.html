<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>7x7 Casino - Игра</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">⚡ 7x7</div>
        <div class="balance-box">Баланс: <span id="balance">1000.00</span> $</div>
    </header>

    <div class="main-container">
        <div class="game-area">
            <h1 id="game-title">Загрузка...</h1>
            <div id="game-content"></div>
            <a href="index.html" class="back-btn">Назад в меню</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const gameType = urlParams.get('type');
        const gameTitleEl = document.getElementById('game-title');
        const gameContentEl = document.getElementById('game-content');
        
        // Получаем баланс из локального хранилища или ставим 1000
        let balance = parseFloat(localStorage.getItem('casinoBalance')) || 1000.00;
        document.getElementById('balance').innerText = balance.toFixed(2);

        function updateBalance(amount) {
            balance += amount;
            document.getElementById('balance').innerText = balance.toFixed(2);
            localStorage.setItem('casinoBalance', balance);
        }

        // --- ЛОГИКА ИНИЦИАЛИЗАЦИИ ИГР ---
        if (gameType === 'olympus') {
            gameTitleEl.innerText = 'Gates of Olympus';
            initSlots(['⚡', '🔱', '💎', '🏺', '👑', '🔴', '🟢', '🔵'], 10);
        } else if (gameType === 'candy') {
            gameTitleEl.innerText = 'Sweet Bonanza';
            initSlots(['🍭', '🍉', '🍇', '🍌', '🍎', '💙', '💜', '🧡'], 10);
        } else if (gameType === 'plinko') {
            gameTitleEl.innerText = 'Plinko';
            initPlinko(5);
        }

        // --- РЕАЛЬНЫЕ СЛОТЫ (JS) ---
        function initSlots(symbols, cost) {
            let gridHtml = '<div class="slot-grid">';
            for(let i=0; i<30; i++) {
                gridHtml += `<div class="grid-cell" id="cell-${i}">${symbols[Math.floor(Math.random()*symbols.length)]}</div>`;
            }
            gridHtml += '</div>';
            gridHtml += `<button class="action-btn" onclick="spinSlots('${symbols.join(',')}', ${cost})">Крутить (${cost}$)</button>`;
            gameContentEl.innerHTML = gridHtml;
        }

        function spinSlots(symbolsString, cost) {
            if (balance < cost) return alert('Нет денег!');
            updateBalance(-cost);
            
            const symbols = symbolsString.split(',');
            const cells = document.querySelectorAll('.grid-cell');
            
            cells.forEach(cell => {
                cell.style.animation = 'spin 0.5s';
                setTimeout(() => {
                    cell.innerText = symbols[Math.floor(Math.random()*symbols.length)];
                    cell.style.animation = '';
                }, 500);
            });

            // Шанс выигрыша
            setTimeout(() => {
                if(Math.random() > 0.6) {
                    let win = cost * (Math.floor(Math.random() * 5) + 2);
                    updateBalance(win);
                    alert('Выигрыш: ' + win + '$!');
                }
            }, 600);
        }

        // --- РЕАЛЬНЫЙ ПЛИНКО (JS) ---
        function initPlinko(cost) {
            let boardHtml = '<div class="plinko-wrapper"><div class="plinko-board" id="board">';
            
            // Генерируем пины
            for(let row=2; row<12; row++) {
                for(let col=0; col<=row; col++) {
                    let left = 225 + (col * 35) - (row * 17.5);
                    let top = row * 30;
                    boardHtml += `<div class="pin" style="left:${left}px; top:${top}px;"></div>`;
                }
            }
            
            boardHtml += '<div class="ball" id="ball" style="top:20px; left:220px;"></div>';
            boardHtml += '</div></div>';
            boardHtml += `<button class="action-btn" onclick="dropPlinko(${cost})">Бросить (${cost}$)</button>`;
            gameContentEl.innerHTML = boardHtml;
        }

        function dropPlinko(cost) {
            if (balance < cost) return alert('Нет денег!');
            updateBalance(-cost);
            
            const ball = document.getElementById('ball');
            let top = 20;
            let left = 220;
            
            let dropInterval = setInterval(() => {
                top += 15;
                // Мяч скачет влево-вправо
                left += (Math.random() - 0.5) * 30;
                
                ball.style.top = top + 'px';
                ball.style.left = left + 'px';
                
                if (top > 350) {
                    clearInterval(dropInterval);
                    ball.style.top = '20px';
                    ball.style.left = '220px';
                    
                    // Выигрыш зависит от того, куда упал (упрощенно)
                    let win = 0;
                    if (left < 150 || left > 300) win = cost * 5;
                    else if (left > 200 && left < 250) win = cost * 0.5;
                    else win = cost * 2;
                    
                    updateBalance(win);
                }
            }, 70);
        }
    </script>
    
    <style>
        /* Анимация для слотов */
        @keyframes spin {
            0% { transform: translateY(-10px); opacity: 0.5; }
            50% { transform: translateY(10px); opacity: 0.5; }
            100% { transform: translateY(0px); opacity: 1; }
        }
    </style>
</body>
</html>
