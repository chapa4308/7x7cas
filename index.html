<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7x7 Casino</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">⚡ 7x7</div>
        <div class="balance-box">Баланс: <span id="balance">1000.00</span> $</div>
    </header>
    <div class="main-container">
        <h2 class="section-title">Выберите игру</h2>
        <div class="games-grid">
            <a href="game.html?type=olympus" class="game-card">
                <div class="card-icon">⚡</div>
                <h3>Божественные врата</h3>
                <p>Слоты</p>
            </a>
            <a href="game.html?type=candy" class="game-card">
                <div class="card-icon">🍭</div>
                <h3>Сладкий взрыв</h3>
                <p>Слоты</p>
            </a>
            <a href="game.html?type=plinko" class="game-card">
                <div class="card-icon">🔴</div>
                <h3>Плинко</h3>
                <p>Аркада</p>
            </a>
            <a href="game.html?type=roulette" class="game-card">
                <div class="card-icon">🎡</div>
                <h3>Рулетка</h3>
                <p>Столы</p>
            </a>
        </div>
    </div>
</body>
</html>
